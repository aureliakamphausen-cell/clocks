<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Weltzeituhr</title>
</head>
<body>
    <div class="clock-container">
        <div class="clock" id="berlin">
            <h3>Berlin</h3>
            <div class="face">
                <div class="hand hour" id="hour-berlin"></div>
                <div class="hand minute" id="min-berlin"></div>
                <div class="hand second" id="sec-berlin"></div>
            </div>
        </div>
        <div class="clock" id="nyc">
            <h3>New York</h3>
            <div class="face">
                <div class="hand hour" id="hour-nyc"></div>
                <div class="hand minute" id="min-nyc"></div>
                <div class="hand second" id="sec-nyc"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
